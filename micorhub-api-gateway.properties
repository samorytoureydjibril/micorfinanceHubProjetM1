# ============================================
# SERVEUR
# ============================================
server.port=8091

# ============================================
# EUREKA
# ============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ============================================
# SPRING CLOUD GATEWAY
# ============================================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ============================================
# ROUTES
# ============================================
spring.cloud.gateway.routes[0].id=micorhub-auth-service
spring.cloud.gateway.routes[0].uri=lb://MICORHUB-AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=client-service
spring.cloud.gateway.routes[1].uri=lb://CLIENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/clients/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=account-service
spring.cloud.gateway.routes[2].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/accounts/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=loan-service
spring.cloud.gateway.routes[3].uri=lb://LOAN-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/loans/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[4].id=repayment-service
spring.cloud.gateway.routes[4].uri=lb://REPAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/repayments/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[5].id=reporting-service
spring.cloud.gateway.routes[5].uri=lb://REPORTING-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reports/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

# ============================================
# REDIS
# ============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ============================================
# JWT
# ============================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.gateway.enabled=true

# ============================================
# LOGGING
# ============================================
logging.level.com.microfinancehub.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO