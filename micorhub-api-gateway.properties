# ============================================
# SERVEUR
# ============================================
server.port=8091

# ============================================
# EUREKA (Service Discovery)
# ============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ============================================
# SPRING CLOUD GATEWAY
# ============================================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ============================================
# ROUTES - Auth2 Service
# ============================================
spring.cloud.gateway.routes[0].id=micorhub-auth2-service
spring.cloud.gateway.routes[0].uri=lb://MICORHUB-AUTH2-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1


# ============================================
# ROUTES - Client Service
# ============================================
spring.cloud.gateway.routes[1].id=micorhub-client-service
spring.cloud.gateway.routes[1].uri=lb://MICORHUB-CLIENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/clients/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# ============================================
# ROUTES - Account Service
# ============================================
spring.cloud.gateway.routes[2].id=micorhub-account2-service
spring.cloud.gateway.routes[2].uri=lb://MICORHUB-ACCOUNT2-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/accounts/**,/api/admin/**,/api/agency/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0


# ============================================
# ROUTES - Loan Service
# ============================================
spring.cloud.gateway.routes[3].id=micorhub-loan-service
spring.cloud.gateway.routes[3].uri=lb://MICORHUB-LOAN-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/loans/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0


# ============================================
# ROUTES - Agency Service
# ============================================
spring.cloud.gateway.routes[3].id=micorhub-agency-service
spring.cloud.gateway.routes[3].uri=lb://MICORHUB-AGENCY-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/agency/**,/api/admin//agencies/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0


# ============================================
# ROUTES - Repayment Service
# ============================================
spring.cloud.gateway.routes[4].id=micorhub-repayment-service
spring.cloud.gateway.routes[4].uri=lb://MICORHUB-REPAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/repayments/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0


# ============================================
# ROUTES - Reporting Service
# ============================================
spring.cloud.gateway.routes[5].id=micorhub-reporting-service
spring.cloud.gateway.routes[5].uri=lb://MICORHUB-REPORTING-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reporting/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0


# ============================================
# ROUTES - Notification Service
# ============================================
spring.cloud.gateway.routes[6].id=micorhub-notification-service
spring.cloud.gateway.routes[6].uri=lb://MICORHUB-NOTIFICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=0


# ============================================
# REDIS (Rate Limiting)
# ============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ============================================
# JWT
# ============================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.gateway.enabled=true

# ============================================
# LOGGING
# ============================================
logging.level.com.microfinancehub.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.web.reactive=DEBUG