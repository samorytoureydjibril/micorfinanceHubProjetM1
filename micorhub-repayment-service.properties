# Server Configuration
server.port=8084

auth.service.url=http://localhost:8080

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/microfinance_repayment
spring.datasource.username=postgres
spring.datasource.password=okomothom-96
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration (désactivé)
spring.flyway.enabled=false

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=5000

# Queue names
rabbitmq.queue.user-login=user.login.queue
rabbitmq.exchange.user-events=user.events
rabbitmq.routing-key.user-login=user.login

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Logging
logging.level.com.microfinancehub.client=DEBUG
logging.level.com.microfinancehub.repayment=DEBUG

# ============================================
# PENALTY CONFIGURATION
# ============================================
repayment.penalty.rate=5                  # 5% de pénalité par mois
repayment.penalty.grace-period-days=3          # 3 jours de grâce sans pénalité
repayment.penalty.enabled=true                 # Activer les pénalités

# ============================================
# TEST MODE - Simulation de retard
# ============================================
repayment.test.simulate-delay=true              # Activer la simulation de retard
repayment.test.delay-months=2                  # 2 mois de retard simulé