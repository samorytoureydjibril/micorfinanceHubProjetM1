# Server Configuration
server.port=8082

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/microfinance_account
spring.datasource.username=postgres
spring.datasource.password=okomothom-96
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Client Service URL
client.service.url=http://localhost:8081

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.clientService.register-health-indicator=true
resilience4j.circuitbreaker.instances.clientService.sliding-window-size=10
resilience4j.circuitbreaker.instances.clientService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.clientService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.clientService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.clientService.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.clientService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.clientService.event-consumer-buffer-size=10

# Resilience4j Retry Configuration
resilience4j.retry.instances.clientService.max-attempts=3
resilience4j.retry.instances.clientService.wait-duration=1s
resilience4j.retry.instances.clientService.retry-exceptions[0]=org.springframework.web.reactive.function.client.WebClientResponseException
resilience4j.retry.instances.clientService.retry-exceptions[1]=java.io.IOException
resilience4j.retry.instances.clientService.retry-exceptions[2]=java.net.SocketTimeoutException

# Resilience4j Time Limiter Configuration (optionnel)
resilience4j.timelimiter.instances.clientService.timeout-duration=2s
resilience4j.timelimiter.instances.clientService.cancel-running-future=true

# Resilience4j Bulkhead Configuration (optionnel)
resilience4j.bulkhead.instances.clientService.max-concurrent-calls=10
resilience4j.bulkhead.instances.clientService.max-wait-duration=10ms

# Redis Cache Configuration (optionnel - décommentez si vous utilisez Redis)
# spring.cache.type=redis
# spring.cache.redis.time-to-live=600000
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Actuator/Metrics Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.health.circuitbreakers.enabled=true

# Logging Configuration
logging.level.com.microfinancehub.account=DEBUG
logging.level.com.microfinancehub.micorhub_account_service=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
logging.level.io.github.resilience4j=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# SpringDoc OpenAPI Configuration (optionnel - pour la documentation Swagger)
# springdoc.api-docs.path=/api-docs
# springdoc.swagger-ui.path=/swagger-ui.html
# springdoc.swagger-ui.operationsSorter=method

# WebClient Configuration
spring.codec.max-in-memory-size=10MB

# Transaction Management
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true