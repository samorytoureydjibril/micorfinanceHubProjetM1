# Server Configuration
server.port=8085

# Service URLs
client.service.url=http://localhost:8081
loan.service.url=http://localhost:8083
repayment.service.url=http://localhost:8084

# Timeout configuration
client.service.timeout=5000
loan.service.timeout=5000
repayment.service.timeout=5000

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=5000

# ============================================
# OAUTH2 / JWT CONFIGURATION
# ============================================

# JWT Configuration (doit correspondre à celle de auth2-service)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# OAuth2 Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=
# Pour la signature HMAC, on ne spécifie pas de jwk-set-uri
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# Désactiver la validation de l'issuer si nécessaire
spring.security.oauth2.resourceserver.jwt.issuer-uri=

# ============================================
# DATABASE CONFIGURATION (Reporting Service)
# ============================================

spring.datasource.url=jdbc:postgresql://localhost:5432/microfinance_reporting
spring.datasource.username=postgres
spring.datasource.password=okomothom-96
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# EUREKA CONFIGURATION
# ============================================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ============================================
# MANAGEMENT ENDPOINTS
# ============================================

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always

# ============================================
# LOGGING
# ============================================

logging.level.com.microfinancehub.micorhub_reporting_service=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG