# Server Configuration
server.port=8085

auth.service.url=http://localhost:8080

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/microfinance_reporting
spring.datasource.username=postgres
spring.datasource.password=okomothom-96
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
sspring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Désactiver Flyway
# spring.flyway.enabled=false

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Optional: Connection timeout
spring.rabbitmq.connection-timeout=5000

# Queue names
rabbitmq.queue.user-login=user.login.queue
rabbitmq.exchange.user-events=user.events
rabbitmq.routing-key.user-login=user.login

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Logging

logging.level.com.microfinancehub.micorhub_repayment_service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG

# Afficher les logs de requêtes
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# Logs de démarrage
logging.level.org.springframework.boot=INFO

# ============================================
# FEIGN CLIENT CONFIGURATION
# ============================================

# Activer le circuit breaker pour Feign
feign.circuitbreaker.enabled=true

# Configuration globale des clients Feign
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=full

# ============================================
# RESILIENCE4J CIRCUIT BREAKER CONFIGURATION
# ============================================

# Circuit Breaker pour Loan Service
resilience4j.circuitbreaker.instances.loanService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.loanService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.loanService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.loanService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.loanService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.loanService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.loanService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.loanService.eventConsumerBufferSize=10

# Circuit Breaker pour Repayment Service
resilience4j.circuitbreaker.instances.repaymentService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.repaymentService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.repaymentService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.repaymentService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.repaymentService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.repaymentService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.repaymentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.repaymentService.eventConsumerBufferSize=10

# Circuit Breaker pour Client Service (optionnel)
resilience4j.circuitbreaker.instances.clientService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.clientService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.clientService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.clientService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.clientService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.clientService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.clientService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.clientService.eventConsumerBufferSize=10

# ============================================
# RESILIENCE4J RETRY CONFIGURATION (optionnel)
# ============================================

# Configuration des retries pour Loan Service
resilience4j.retry.instances.loanService.maxAttempts=3
resilience4j.retry.instances.loanService.waitDuration=1s
resilience4j.retry.instances.loanService.retryExceptions=org.springframework.web.client.HttpServerErrorException, java.io.IOException

# Configuration des retries pour Repayment Service
resilience4j.retry.instances.repaymentService.maxAttempts=3
resilience4j.retry.instances.repaymentService.waitDuration=1s
resilience4j.retry.instances.repaymentService.retryExceptions=org.springframework.web.client.HttpServerErrorException, java.io.IOException

# ============================================
# RESILIENCE4J TIMELIMITER CONFIGURATION (optionnel)
# ============================================

resilience4j.timelimiter.instances.loanService.timeoutDuration=5s
resilience4j.timelimiter.instances.loanService.cancelRunningFuture=true

resilience4j.timelimiter.instances.repaymentService.timeoutDuration=5s
resilience4j.timelimiter.instances.repaymentService.cancelRunningFuture=true

# ============================================
# ACTUATOR ENDPOINTS (pour surveiller les circuit breakers)
# ============================================

management.endpoints.web.exposure.include=health,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true